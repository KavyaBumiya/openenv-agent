name: Deploy to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

env:
  REPO_TYPE: space
  REPO_ID: kavyabumiya/openenv
  SPACE_NAME: openenv

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check HF token
        run: |
          if [ -z "${{ secrets.HF_TOKEN }}" ]; then
            echo "❌ HF_TOKEN secret not set"
            echo "Please set HF_TOKEN in GitHub Settings → Secrets"
            exit 1
          fi
          echo "✓ HF_TOKEN is configured"

      - name: Push to Hugging Face Spaces
        run: |
          python -m pip install --upgrade pip
          python -m pip install "huggingface_hub>=0.32.0"

          # Preflight: validate token and print account identity for easier debugging.
          python - <<'PY'
          import os
          from huggingface_hub import whoami

          token = os.environ["HF_TOKEN"]
          info = whoami(token=token)
          print(f"HF auth OK as: {info.get('name')}")
          PY

          # Upload current repo contents to the target Space.
          # This avoids git credential URL edge-cases in CI.
          python -m huggingface_hub.commands.huggingface_cli upload \
            "${{ env.REPO_ID }}" \
            . \
            --repo-type "${{ env.REPO_TYPE }}" \
            --token "${{ secrets.HF_TOKEN }}" \
            --commit-message "Deploy from GitHub Actions ${GITHUB_SHA}"
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          GIT_AUTHOR_NAME: github-actions
          GIT_AUTHOR_EMAIL: github-actions@github.com
          GIT_COMMITTER_NAME: github-actions
          GIT_COMMITTER_EMAIL: github-actions@github.com

      - name: Wait for build
        run: |
          echo "⏳ HF Spaces is building..."
          echo "View progress at: https://huggingface.co/spaces/${{ env.REPO_ID }}"
          sleep 10

      - name: Create GitHub deployment
        continue-on-error: true
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.ref,
              environment: 'production',
              production_environment: true,
              auto_merge: false,
              description: 'Deployed to HF Spaces',
              environment_url: 'https://huggingface.co/spaces/${{ env.REPO_ID }}'
            });

  # Optional: Test deployment
  test-deployment:
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: success()

    steps:
      - name: Wait for space to be ready
        run: sleep 30

      - name: Health check
        run: |
          OWNER_LC="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          SPACE_URL="https://${OWNER_LC}-${{ env.SPACE_NAME }}.hf.space"
          MAX_ATTEMPTS=30
          ATTEMPT=0
          
          echo "🔍 Checking Space availability..."
          echo "URL: $SPACE_URL"
          
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            HEALTH_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$SPACE_URL/health" || echo "000")
            RESET_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$SPACE_URL/reset" -H "content-type: application/json" -d '{}' || echo "000")

            if [ "$HEALTH_CODE" = "200" ] && [ "$RESET_CODE" = "200" ]; then
              echo "✓ Space is online (/health=$HEALTH_CODE, /reset=$RESET_CODE)"
              exit 0
            fi
            
            ATTEMPT=$((ATTEMPT + 1))
            echo "⏳ Attempt $ATTEMPT/$MAX_ATTEMPTS (/health=$HEALTH_CODE, /reset=$RESET_CODE)"
            sleep 15
          done
          
          echo "❌ Space readiness check failed after $MAX_ATTEMPTS attempts"
          echo "Expected /health=200 and /reset=200 at $SPACE_URL"
          exit 1

  # Notify on deployment (optional)
  # Complete once SLACK_WEBHOOK_URL secret is added
