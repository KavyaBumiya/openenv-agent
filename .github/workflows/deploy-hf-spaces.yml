name: Deploy to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REPO_TYPE: space
  REPO_ID: ${{ github.repository_owner }}/customer-support-env

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check HF token
        run: |
          if [ -z "${{ secrets.HF_TOKEN }}" ]; then
            echo "❌ HF_TOKEN secret not set"
            echo "Please set HF_TOKEN in GitHub Settings → Secrets"
            exit 1
          fi
          echo "✓ HF_TOKEN is configured"

      - name: Push to Hugging Face Spaces
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "github-actions"
          
          # Remove existing remote
          git remote remove hf || true
          
          # Add HF Spaces remote with simple token authentication
          git remote add hf https://token:${{ secrets.HF_TOKEN }}@huggingface.co/${{ env.REPO_ID }}
          
          # Force push to HF Spaces
          git push --force hf main
        env:
          GIT_AUTHOR_NAME: github-actions
          GIT_AUTHOR_EMAIL: github-actions@github.com
          GIT_COMMITTER_NAME: github-actions
          GIT_COMMITTER_EMAIL: github-actions@github.com

      - name: Wait for build
        run: |
          echo "⏳ HF Spaces is building..."
          echo "View progress at: https://huggingface.co/spaces/${{ env.REPO_ID }}"
          sleep 10

      - name: Create GitHub deployment
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.ref,
              environment: 'production',
              production_environment: true,
              auto_merge: false,
              description: 'Deployed to HF Spaces',
              environment_url: 'https://huggingface.co/spaces/${{ env.REPO_ID }}'
            });

  # Optional: Test deployment
  test-deployment:
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: success()

    steps:
      - name: Wait for space to be ready
        run: sleep 30

      - name: Health check
        run: |
          SPACE_URL="https://${{ github.repository_owner }}-customer-support-env.hf.space"
          MAX_ATTEMPTS=6
          ATTEMPT=0
          
          echo "🔍 Checking Space availability..."
          echo "URL: $SPACE_URL"
          
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$SPACE_URL" || echo "000")
            
            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "301" ]; then
              echo "✓ Space is online (HTTP $HTTP_CODE)"
              exit 0
            fi
            
            ATTEMPT=$((ATTEMPT + 1))
            echo "⏳ Attempt $ATTEMPT/$MAX_ATTEMPTS (HTTP $HTTP_CODE)"
            sleep 10
          done
          
          echo "⚠️ Space may not be ready yet. Check HF dashboard for status."
          exit 0  # Don't fail; HF Spaces may take longer to warm up

  # Notify on deployment (optional)
  # Complete once SLACK_WEBHOOK_URL secret is added
