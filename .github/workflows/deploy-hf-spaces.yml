name: Deploy to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REPO_TYPE: space
  REPO_ID: ${{ github.repository_owner }}/customer-support-env

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check HF token
        run: |
          if [ -z "${{ secrets.HF_TOKEN }}" ]; then
            echo "❌ HF_TOKEN secret not set"
            echo "Please set HF_TOKEN in GitHub Settings → Secrets"
            exit 1
          fi
          echo "✓ HF_TOKEN is configured"

      - name: Push to Hugging Face Spaces
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "github-actions"
          
          # Remove existing remote
          git remote remove hf || true
          
          # Add HF Spaces remote with token authentication
          git remote add hf https://git:${{ secrets.HF_TOKEN }}@huggingface.co/${{ env.REPO_ID }}
          
          # Force push to HF Spaces
          git push --force hf main
        env:
          GIT_AUTHOR_NAME: github-actions
          GIT_AUTHOR_EMAIL: github-actions@github.com
          GIT_COMMITTER_NAME: github-actions
          GIT_COMMITTER_EMAIL: github-actions@github.com

      - name: Wait for build
        run: |
          echo "⏳ HF Spaces is building..."
          echo "View progress at: https://huggingface.co/spaces/${{ env.REPO_ID }}"
          sleep 10

      - name: Create GitHub deployment
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.ref,
              environment: 'production',
              production_environment: true,
              auto_merge: false,
              description: 'Deployed to HF Spaces',
              environment_url: 'https://huggingface.co/spaces/${{ env.REPO_ID }}'
            });

  # Optional: Test deployment
  test-deployment:
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: success()

    steps:
      - name: Wait for space to be ready
        run: sleep 30

      - name: Health check
        run: |
          SPACE_URL="https://${{ github.repository_owner }}-customer-support-env.hf.space"
          MAX_ATTEMPTS=6
          ATTEMPT=0
          
          echo "🔍 Checking Space availability..."
          echo "URL: $SPACE_URL"
          
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$SPACE_URL" || echo "000")
            
            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "301" ]; then
              echo "✓ Space is online (HTTP $HTTP_CODE)"
              exit 0
            fi
            
            ATTEMPT=$((ATTEMPT + 1))
            echo "⏳ Attempt $ATTEMPT/$MAX_ATTEMPTS (HTTP $HTTP_CODE)"
            sleep 10
          done
          
          echo "⚠️ Space may not be ready yet. Check HF dashboard for status."
          exit 0  # Don't fail; HF Spaces may take longer to warm up

  # Notify on deployment
  notify:
    needs: deploy
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Send Slack notification
        if: success()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "✅ Deployed to HF Spaces",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Deployment Status:* Success ✅\n*Environment:* HF Spaces\n*Space URL:* https://huggingface.co/spaces/${{ env.REPO_ID }}\n*Commit:* ${{ github.sha }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Send Slack notification (failure)
        if: failure()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "❌ Deployment to HF Spaces failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Deployment Status:* Failed ❌\n*Environment:* HF Spaces\n*Repository:* ${{ github.repository }}\n*Branch:* ${{ github.ref }}"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Logs"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
