name: Run Benchmarks

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Run daily at 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Benchmark mode"
        required: true
        default: "official"
        type: choice
        options:
          - official
          - training

env:
  PYTHONIOENCODING: utf-8
  PYTHON_VERSION: "3.11"

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify data files
        run: |
          python -c "from customer_support_env.data import TICKETS; print(f'✓ {len(TICKETS)} tickets loaded')"

      - name: Run benchmark (Official mode)
        if: github.event.inputs.mode != 'training' || github.event_name != 'workflow_dispatch'
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python run_official_benchmark.py 2>&1 | tee benchmark_output.log
        continue-on-error: true

      - name: Run benchmark (Training mode)
        if: github.event.inputs.mode == 'training'
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python main.py baseline --mode training 2>&1 | tee benchmark_output.log
        continue-on-error: true

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-reports
          path: benchmark_output.log
          retention-days: 30

      - name: Comment PR with results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            
            let comment = '## 📊 Benchmark Results\n\n';
            
            // Try to read benchmark output
            const logFile = 'benchmark_output.log';
            if (fs.existsSync(logFile)) {
              const log = fs.readFileSync(logFile, 'utf-8');
              
              // Extract results section
              const resultsMatch = log.match(/OVERALL BASELINE RESULTS[\s\S]*?(Mean score:.*?Max score:.*?Score variance:.*?)(?:\n\n|$)/);
              if (resultsMatch) {
                comment += '```\n' + resultsMatch[1].trim() + '\n```\n';
              }
            }
            
            // Add info about report
            comment += '\n📁 Full reports available in artifacts.\n';
            comment += 'ℹ️ Benchmarks run with temperature=0.1 across all tasks.\n';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Check benchmark results
        if: always()
        run: |
          if [ -f "reports/benchmark_output.txt" ]; then
            echo "✓ Benchmark completed successfully"
          else
            echo "⚠️ Benchmark may have skipped (GROQ_API_KEY likely not set)"
          fi

  # Optional: Slack notification
  notify:
    if: always() && github.event_name == 'push'
    needs: benchmark
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack notification
        if: failure()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "⚠️ Benchmark job failed for ${{ github.repository }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Benchmark Status:* Failed ❌\n*Repository:* ${{ github.repository }}\n*Branch:* ${{ github.ref }}\n*Commit:* ${{ github.sha }}"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Logs"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
