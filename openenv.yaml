name: customer_support_env
version: 0.1.0
description: >
  Multi-turn LLM agent environment for customer support ticket triage.
  Agents classify, route, and resolve real-world support tickets with
  business-aware graders that reward trajectory progress.

api_spec: openenv_0.1
environment_type: rl
episode_type: multi-turn

tasks:
  - name: classify
    grader: customer_support_env.graders:ClassifyGrader
    description: >
      Classify ticket into category (billing/technical/account/general/shipping)
      and assign priority (low/medium/high/urgent).
    difficulty: easy
    max_steps: 1
    action_schema:
      category:
        type: string
        enum: [billing, technical, account, general, shipping]
        required: true
      priority:
        type: string
        enum: [low, medium, high, urgent]
        required: true
    observation_fields:
      - ticket_id
      - subject
      - body
      - sender_tier
      - open_since_hours
      - sentiment
      - task_name
      - task_description
      - action_schema
      - policy_excerpt

  - name: route
    grader: customer_support_env.graders:RouteGrader
    description: >
      Classify a ticket and route it to the right department
      (tier1/tier2/billing/engineering/management), with optional escalation flag.
    difficulty: medium
    max_steps: 2
    action_schema:
      category:
        type: string
        enum: [billing, technical, account, general, shipping]
        required: true
      priority:
        type: string
        enum: [low, medium, high, urgent]
        required: true
      department:
        type: string
        enum: [tier1, tier2, billing, engineering, management]
        required: true
      requires_escalation:
        type: boolean
        required: false
    observation_fields:
      - ticket_id
      - subject
      - body
      - sender_tier
      - previous_tickets
      - open_since_hours
      - sentiment
      - task_name
      - task_description
      - action_schema
      - policy_excerpt

  - name: resolve
    grader: customer_support_env.graders:ResolveGrader
    description: >
      Classify, prioritize, route a ticket, then draft a professional
      customer-facing response that acknowledges the issue and provides
      actionable next steps.
    difficulty: hard
    max_steps: 3
    action_schema:
      category:
        type: string
        enum: [billing, technical, account, general, shipping]
        required: true
      priority:
        type: string
        enum: [low, medium, high, urgent]
        required: true
      department:
        type: string
        enum: [tier1, tier2, billing, engineering, management]
        required: true
      requires_escalation:
        type: boolean
        required: false
      response:
        type: string
        required: true
    observation_fields:
      - ticket_id
      - subject
      - body
      - sender_tier
      - previous_tickets
      - open_since_hours
      - sentiment
      - task_name
      - task_description
      - action_schema
      - policy_excerpt

reward_config:
  type: shaped
  range: [0.0, 1.0]
  trajectory:
    progress_signal: best_score_improvement
    penalties:
      repeated_actions: 0.15
      extra_step: 0.05
  tasks:
    classify:
      weights: {category: 0.6, priority: 0.4}
    route:
      weights: {category: 0.35, priority: 0.25, department: 0.25, escalation: 0.15}
    resolve:
      weights: {category: 0.2, priority: 0.15, department: 0.2, escalation: 0.15, response: 0.3}

agent_interface:
  observation_format: text
  action_format: json
  communication_protocol: rest_api

randomness:
  seed_support: true
  dataset_size: 30

api:
  host: "0.0.0.0"
  port: 7860
  endpoints:
    - POST /reset
    - POST /step
    - GET /state
    - GET /tasks
    - GET /grader
    - GET /health

dataset:
  name: customer_support_tickets_v1
  size: 30
  categories: [billing, technical, account, general, shipping]
  tiers: [free, premium, enterprise]
